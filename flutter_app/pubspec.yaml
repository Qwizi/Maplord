name: maplord
description: MapLord 2.0 - Real-time strategy game on a world map
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  go_router: ^14.6.2
  json_annotation: ^4.9.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
