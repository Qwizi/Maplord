name: Build Flutter App

on:
  push:
    branches:
      - master
      - main
    paths:
      - flutter_app/**
      - .github/workflows/flutter-build.yml
  pull_request:
    paths:
      - flutter_app/**
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        default: 'https://maplord.qwizi.ovh/api/v1'
        required: false
      ws_base_url:
        description: 'WebSocket Base URL'
        default: 'wss://maplord.qwizi.ovh/ws'
        required: false

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.4'
  API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://maplord.qwizi.ovh/api/v1' }}
  WS_BASE_URL: ${{ github.event.inputs.ws_base_url || 'wss://maplord.qwizi.ovh/ws' }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create Flutter project files
        run: |
          flutter create --project-name maplord --org ovh.qwizi.maplord --platforms android,ios,web .

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ env.WS_BASE_URL }}

      - name: Build App Bundle (release)
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ env.WS_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplord-android-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplord-android-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create Flutter project files
        run: |
          flutter create --project-name maplord --org ovh.qwizi.maplord --platforms android,ios,web .

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ env.WS_BASE_URL }}

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplord-web
          path: flutter_app/build/web/
          retention-days: 30

  build-ios:
    name: Build iOS (no signing)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create Flutter project files
        run: |
          flutter create --project-name maplord --org ovh.qwizi.maplord --platforms android,ios,web .

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ env.WS_BASE_URL }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplord-ios
          path: flutter_app/build/ios/iphoneos/Runner.app
          retention-days: 30

  release:
    name: Create Release
    needs: [build-android, build-web]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: maplord-android-apk
          path: artifacts/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: maplord-android-aab
          path: artifacts/

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: maplord-web
          path: artifacts/web/

      - name: Create web archive
        run: |
          cd artifacts/web
          zip -r ../maplord-web.zip .

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'v%Y.%-m.%-d')-flutter
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "MapLord Flutter ${{ steps.version.outputs.version }}"
          body: |
            ## MapLord Flutter App

            **Server:** https://maplord.qwizi.ovh

            ### Downloads
            - **Android APK** — install directly on Android device
            - **Android AAB** — for Google Play upload
            - **Web** — deployable Flutter web build

            ### Installation (Android)
            1. Download `app-release.apk`
            2. Open on your Android device
            3. Allow installation from unknown sources if prompted
            4. Install and play!
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
            artifacts/maplord-web.zip
          draft: false
          prerelease: false
